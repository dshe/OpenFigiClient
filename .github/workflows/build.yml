name: .NET Build & Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:  # enable manual runs

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "8.0.x"   # Adjust to your project’s target framework

    - name: Restore dependencies
      run: dotnet restore OpenFigiClient.slnx

    - name: Build solution
      run: dotnet build OpenFigiClient.slnx --configuration Release --no-restore

    - name: Run tests
      run: dotnet test OpenFigiClient.Tests/OpenFigiClient.Tests.csproj --no-build --verbosity diag
